# Configuration file

auto_sieve {
    # Energy consumed by the Auto Sieve each tick (FE/t). [range: 0 ~ 100000, default: 100]
    I:energy_per_tick=100

    # Percentage chance for double drops per Fortune Upgrade (e.g. 1.0 = 1% per upgrade). [range: 0.0 ~ 100.0, default: 1.0]
    S:fortune_upgrade_chance=1.0

    # Drop amount multiplier for the manual sieve. [range: 1 ~ 64, default: 1]
    I:manual_drop_multiplier=1

    # Time (in seconds) to manually sieve one block. [range: 1 ~ 300, default: 2]
    I:manual_process_seconds=2

    # Internal energy buffer capacity for the Auto Sieve (FE). [range: 1000 ~ 1000000, default: 10000]
    I:max_energy=10000

    # Maximum number of Fortune Upgrades the Auto Sieve can utilise. [range: 0 ~ 64, default: 8]
    I:max_fortune_upgrades=8

    # Maximum number of Speed Upgrades the Auto Sieve can utilise. [range: 0 ~ 64, default: 8]
    I:max_speed_upgrades=8

    # Base time (in seconds) to process one item in the Auto Sieve (before Speed Upgrades). [range: 1 ~ 3600, default: 5]
    I:process_seconds=5

    # Speed bonus per Speed Upgrade (e.g. 0.5 = +50% speed per upgrade). [range: 0.01 ~ 10.0, default: 0.5]
    S:speed_upgrade_modifier=0.5

    # Additional energy-per-tick multiplier per Speed Upgrade (e.g. 0.2 = +20% FE/t per upgrade). [range: 0.0 ~ 10.0, default: 0.2]
    S:speed_upgrade_power_multiplier=0.2
}


big_reactors {
    # Base energy buffer capacity for the reactor (FE). [range: 10000 ~ 1000000000, default: 10000000]
    I:base_energy_buffer=10000000

    # Additional energy capacity per block in the reactor volume. [range: 0 ~ 10000000, default: 10000]
    I:energy_buffer_per_block=10000

    # Global multiplier for fuel consumption. [range: 0.0 ~ 1000.0, default: 1.0]
    S:fuel_usage_multiplier=1.0

    # Maximum height of a reactor. [range: 3 ~ 128, default: 48]
    I:max_reactor_height=48

    # Maximum width and length of a reactor. [range: 3 ~ 128, default: 32]
    I:max_reactor_size=32

    # Multiplier for the cooling effectiveness of internal moderators (e.g. water, diamond blocks). [range: 0.0 ~ 100.0, default: 1.0]
    S:passive_cooling_multiplier=1.0

    # Global multiplier for passive energy generation. [range: 0.0 ~ 1000.0, default: 1.0]
    S:power_production_multiplier=1.0

    # Multiplier for radiation generated by fuel rods (affects heat and power). [range: 0.0 ~ 100.0, default: 1.0]
    S:radiation_multiplier=1.0

    # How many ticks between reactor network/GUI updates. Higher means better server TPS but slower GUI updates. [range: 1 ~ 200, default: 20]
    I:ticks_per_update=20
}


chunkloader {
    # Maximum number of Quantum Anchors allowed per player (Server OPs bypass this limit). [range: 1 ~ 100, default: 3]
    I:max_per_player=3

    # Number of anchors to load per server tick after a restart (Staggered loading to prevent lag spikes). [range: 1 ~ 20, default: 1]
    I:startup_load_speed=1
}


hammers {
    # Max durability for Diamond Hammer. [range: 1 ~ 32767, default: 512]
    I:durability_diamond=512

    # Max durability for Iron Hammer. [range: 1 ~ 32767, default: 256]
    I:durability_iron=256

    # Max durability for Wooden Hammer. [range: 1 ~ 32767, default: 128]
    I:durability_wood=128

    # Chance (0..1) that Diamond Hammer yields +1 extra drop. [range: 0.0 ~ 1.0, default: 0.5]
    S:extra_chance_diamond=0.5

    # Chance (0..1) that Iron Hammer yields +1 extra drop. [range: 0.0 ~ 1.0, default: 0.25]
    S:extra_chance_iron=0.25

    # If true, hammers cannot break blocks not defined in hammers.json. [default: true]
    B:prevent_breaking_unlisted=true
}


machines {
    # Crucible internal tank capacity in mB. [range: 1000 ~ 64000, default: 16000]
    I:crucible_tank_capacity=16000

    # Matter Generator internal energy buffer capacity. [range: 100000 ~ 10000000, default: 1000000]
    I:matter_gen_energy=1000000
}


oregen {
    # Names of worlds where NTI ores are allowed to spawn. [default: [world], [suro]]
    S:allowed_worlds <
        world
        suro
     >

    # Global toggle for NTI ore generation. [default: true]
    B:enabled=true
}


quarry {
    # List of world/dimension names where Quarry is allowed to dig. [default: [world], [suro], [mining_world]]
    S:allowed_worlds <
        world
        suro
        mining_world
     >

    # Base energy cost in FE/tick to mine/break a block. [range: 10 ~ 10000, default: 500]
    I:base_energy_cost=500

    # Base tick delay of Quarry (lower means faster, upgrades reduce this value). [range: 1 ~ 100, default: 20]
    I:base_speed=20

    # Default width/length of Quarry digging area if markers are not used. [range: 3 ~ 32, default: 5]
    I:default_size=5

    # Maximum width/length of Quarry digging area allowed. [range: 5 ~ 256, default: 128]
    I:max_size=128

    # If true, building frame requires Quarry Frame items from the Quarry's inventory. Otherwise, they are built using only energy. [default: false]
    B:requires_frame_items=false
}


tools {
    # Building radius of the Quantum Builder Wand (e.g., 4 means 9x9, 5 means 11x11). [range: 1 ~ 16, default: 4]
    I:builder_wand_range=4

    # Number of blocks placed per server tick. Lower values prevent client-side lag spikes when building large structures. [range: 1 ~ 64, default: 5]
    I:builder_wand_speed=5
}


upgrades {
    # Additional energy/fluid capacity per upgrade. [range: 1000 ~ 100000, default: 10000]
    I:capacity_value=10000

    # Energy consumption multiplier per upgrade. [range: 0.1 ~ 1.0, default: 0.9]
    S:energy_multiplier=0.9

    # Maximum number of upgrades allowed in a single machine slot. [range: 1 ~ 64, default: 16]
    I:max_upgrades_per_slot=16

    # Processing time multiplier per upgrade. [range: 0.1 ~ 1.0, default: 0.85]
    S:speed_multiplier=0.85
}


 