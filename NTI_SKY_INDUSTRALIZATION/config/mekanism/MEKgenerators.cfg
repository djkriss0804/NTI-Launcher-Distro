# Configuration file

generation {

    ##########################################################################################################
    # solar-and-bio
    #--------------------------------------------------------------------------------------------------------#
    # Solar & Bio Generation
    ##########################################################################################################

    solar-and-bio {
        # Peak output for the Advanced Solar Generator.
        D:AdvancedSolarGeneration=300.0

        # Energy storage capacity for Advanced Solar Generator.
        D:AdvancedSolarStorage=200000.0

        # Joules produced per tick by the Bio-Generator.
        D:BioGeneration=350.0

        # Energy storage capacity for Bio-Generator.
        D:BioStorage=160000.0

        # Peak output for the Solar Generator.
        D:SolarGeneration=50.0

        # Energy storage capacity for Solar Generator.
        D:SolarStorage=96000.0
    }

    ##########################################################################################################
    # heat
    #--------------------------------------------------------------------------------------------------------#
    # Heat Generation
    ##########################################################################################################

    heat {
        # Base energy produced per tick by the Heat Generator.
        D:HeatGeneration=150.0

        # Multiplier for lava effectiveness in Heat Generator.
        D:HeatGenerationLava=5.0

        # Extra energy produced when Heat Generator is in the Nether.
        D:HeatGenerationNether=100.0

        # Energy storage capacity for Heat Generator.
        D:HeatStorage=160000.0
    }

    ##########################################################################################################
    # wind
    #--------------------------------------------------------------------------------------------------------#
    # Wind Generation
    ##########################################################################################################

    wind {
        # Dimension IDs where wind turbines will not function.
        I:WindDimensionBlacklist <
         >

        # Maximum base generation at highest valid height.
        D:WindGenerationMax=480.0

        # Minimum base generation at lowest valid height.
        D:WindGenerationMin=60.0

        # Maximum Y level for wind power generation.
        I:WindMaxY=255

        # Minimum Y level for wind power generation.
        I:WindMinY=24

        # Energy storage capacity for Wind Generator.
        D:WindStorage=96000.0
    }

    ##########################################################################################################
    # turbine
    #--------------------------------------------------------------------------------------------------------#
    # Industrial Turbine
    ##########################################################################################################

    turbine {
        # Number of blades per turbine coil for power calculations.
        I:TurbineBladesPerCoil=4

        # Rate at which steam is condensed back into water.
        I:TurbineCondenserRate=100000

        # Rate at which steam is dispersed into the turbine.
        D:TurbineDisperserFlow=10000.0

        # Multiplier for coils in the max-size (15x15x18) endgame turbine.
        D:TurbineEndgameCoilMultiplier=0.5

        # Energy storage capacity per volume unit.
        D:TurbineStorage=1.6E7

        # Rate at which steam is vented into the turbine.
        D:TurbineVentFlow=100000.0
    }

}


##########################################################################################################
# generators
#--------------------------------------------------------------------------------------------------------#
# Core Logic
##########################################################################################################

generators {
    # Allow AdvancedSolarGenerator to be used/crafted. Requires game restart to fully take effect.
    B:AdvancedSolarGeneratorEnabled=true

    # Allow BioGenerator to be used/crafted. Requires game restart to fully take effect.
    B:BioGeneratorEnabled=true

    # Allow GasGenerator to be used/crafted. Requires game restart to fully take effect.
    B:GasGeneratorEnabled=true

    # Threads for Large Gas Generator. Affects burn rate, power output, and storage.
    I:GasGeneratorThreads=1024

    # Allow HeatGenerator to be used/crafted. Requires game restart to fully take effect.
    B:HeatGeneratorEnabled=true

    # Allow SolarGenerator to be used/crafted. Requires game restart to fully take effect.
    B:SolarGeneratorEnabled=true

    # Max height for a Turbine.
    I:TurbineMaxHeight=18

    # Max radius for a Turbine.
    I:TurbineMaxRadius=18

    # If true, blades deal lethal damage to entities.
    B:WindBladeDamageEnabled=false

    # Ticks an entity must be in blades before explosion occurs.
    I:WindExplodeTicks=100

    # If true, turbine can explode if entities are stuck in blades.
    B:WindExplosionEnabled=false

    # Blast radius of a turbine explosion.
    I:WindExplosionRadius=45

    # Allow WindGenerator to be used/crafted. Requires game restart to fully take effect.
    B:WindGeneratorEnabled=true

    # Threads for Large Wind Turbine. Affects power output and internal storage.
    I:WindGeneratorThreads=1024

    # Base generation at maximum height.
    D:WindMaxGeneration=294000.0

    # Maximum height for generation scaling.
    I:WindMaxY=255

    # Base generation at minimum height.
    D:WindMinGeneration=60.0

    # Minimum height for generation scaling.
    I:WindMinY=50

    # If true, turbine stops if another identical turbine is detected within range.
    B:WindRangeCheckEnabled=true

    # Distance check for identical turbines (default 50).
    I:WindRangeDistance=50
}


