# Configuration file

client {

    ##########################################################################################################
    # audio-and-environment
    #--------------------------------------------------------------------------------------------------------#
    # Audio & Environment
    ##########################################################################################################

    audio-and-environment {
        # Enable sounds produced by machines while they are actively running.
        B:EnableMachineSounds=true

        # Enable sounds for player-worn equipment like Jetpacks or Gas Masks.
        B:EnablePlayerSounds=true

        # Enable special holiday-themed greetings in chat (Christmas, New Year).
        B:Holidays=true

        # Base volume for Mekanism sounds. Values below 1.0 are quieter, above 1.0 are louder.
        D:SoundVolume=1.0
    }

    ##########################################################################################################
    # machine-visuals
    #--------------------------------------------------------------------------------------------------------#
    # Machine Visual Effects
    ##########################################################################################################

    machine-visuals {
        # Brightness level of the light produced by active machines (1-15).
        I:AmbientLightingLevel=15

        # Render distance for bloom effects. Set to 0 to follow standard tile rendering range.
        I:CustomBloomDistance=64

        # Bloom algorithm: 0 = Gaussian (Fast), 1 = Unity, 2 = Unreal (High Quality).
        I:CustomBloomStyle=0

        # Whether active machines should produce actual block light in the world.
        B:EnableAmbientLighting=true

        # Enable glow/bloom textures for specific machines. Requires GTCEu or Lumenized.
        B:EnableBloom=false

        # Show particle effects (smoke, steam) when machines are active.
        B:MachineEffects=true

        # Show particle burst when a multiblock structure is successfully formed.
        B:MultiblockFormParticles=true

        # Show visual effects for Meka-Tool area actions, such as vein mining bolts.
        B:RenderToolAOEParticles=true
    }

    ##########################################################################################################
    # transmitters-and-rendering
    #--------------------------------------------------------------------------------------------------------#
    # Transmitters & Rendering
    ##########################################################################################################

    transmitters-and-rendering {
        # If true, Cables/Pipes will not be transparent and will not render their contents (Better performance).
        B:OpaqueTransmitterRender=false

        # Range at which special Tile Entity Renderers (like multiblock contents) are visible.
        I:TileEntityRenderRange=256

        # Distance at which transparent contents of pipes/cables are rendered.
        I:TransmitterInteriorDistance=64
    }

    ##########################################################################################################
    # wind-generators
    #--------------------------------------------------------------------------------------------------------#
    # Wind Generators
    ##########################################################################################################

    wind-generators {
        # Distance at which large wind turbine blades are rendered.
        I:LargeWindGeneratorFanDistance=64

        # If true, large turbines bypass standard culling to prevent flickering when close.
        B:LargeWindGeneratorGlobalRender=true

        # Enable rendering of the large wind turbine model. Disable to save FPS.
        B:LargeWindGeneratorRendering=true

        # Distance at which small wind turbine blades are rendered. Set to 0 for always.
        I:WindGeneratorBladeDistance=16

        # Enable blade rotation for the placed Wind Turbine block.
        B:WindGeneratorBlockRotation=true

        # Enable blade rotation for the Wind Turbine item in hand or inventory.
        B:WindGeneratorItemRotation=true
    }

    ##########################################################################################################
    # hud-and-ui
    #--------------------------------------------------------------------------------------------------------#
    # HUD & MekaSuit UI
    ##########################################################################################################

    hud-and-ui {
        # Align the HUD to the left side (true) or right side (false) of the screen.
        B:AlignHUDLeft=true

        # Display item information HUD (energy, mode, etc.) during gameplay.
        B:EnableHUD=true

        # Custom background color for all Mekanism GUIs (Hex ARGB).
        I:GuiBackgroundColor=-1

        # Primary color (RGB) for the MekaSuit HUD.
        I:HUDColor=4257264

        # Color for critical/danger elements in the HUD.
        I:HUDDangerColor=16726076

        # Amount of HUD 'bounce' when the player moves their head.
        D:HUDJitter=6.0

        # Horizontal offset for the HUD position.
        I:HUDOffsetX=0

        # Vertical offset for the HUD position.
        I:HUDOffsetY=0

        # Background opacity for the HUD.
        D:HUDOpacity=0.4000000059604645

        # Visual scale of the HUD text elements.
        D:HUDScale=0.6000000238418579

        # Color for warning elements in the HUD.
        I:HUDWarningColor=16768335

        # Render MekaSuit arms in first-person view.
        B:MekaSuitFirstPersonArms=true

        # Show the compass element on the MekaSuit helmet HUD.
        B:MekaSuitHelmetCompass=true

        # Force all text in radial menus to be white for better contrast.
        B:WhiteRadialMenuText=false
    }

    ##########################################################################################################
    # performance-and-optimization
    #--------------------------------------------------------------------------------------------------------#
    # Performance & Optimization
    ##########################################################################################################

    performance-and-optimization {
        # Stop rendering machines that are not in the player's direct line of sight.
        B:GazeCulling=true

        # Frequency of visibility checks. Higher values reduce GPU overhead but may cause slight delay in rendering.
        I:GazeCullingInterval=2

        # Use GPU-based occlusion queries for gaze culling. Faster on modern GPUs.
        B:GazeCullingOpenGL=true

        # Maximum number of radiation particles spawned (scaled by severity).
        I:RadiationParticleCount=16

        # Radius around the player where radiation particles can appear.
        I:RadiationParticleRadius=28
    }

    ##########################################################################################################
    # selection-wireframes
    #--------------------------------------------------------------------------------------------------------#
    # Selection & Wireframes
    ##########################################################################################################

    selection-wireframes {
        # Enable advanced model-based selection outlines instead of standard vanilla boxes.
        B:EnableSelectionWireframes=true

        # Mods allowed to render internal edges in wireframes.
        S:SelectionInternalEdgesWhitelist <
         >

        # Thickness of the selection outline.
        D:SelectionLineWidth=2.0

        # List of Mod IDs allowed to use advanced selection boxes.
        S:SelectionModWhitelist <
            mekanism
            mekanismgenerators
            mekanismtools
            mekanismmultiblockmachine
            mekceumoremachine
         >

        # Models to be excluded from advanced selection rendering.
        S:SelectionModelBlacklist <
            mekanism:nothing
            mekanism:basic_cube
            mekanism:machine
         >

        # Whether selection outlines should cycle through colors.
        B:SelectionRainbowEffect=false
    }

    ##########################################################################################################
    # core-logic
    #--------------------------------------------------------------------------------------------------------#
    # Core Logic
    ##########################################################################################################

    core-logic {
        # Enable switching item modes using Sneak + Mouse Scroll.
        B:AllowModeScroll=true
    }

}


 